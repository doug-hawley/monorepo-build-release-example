name: Post-Merge Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Print changed projects
        run: ./gradlew printChangedProjectsFromRef

      - name: Write changed projects
        run: ./gradlew writeChangedProjectsFromRef

      - name: Upload changed projects list
        uses: actions/upload-artifact@v4
        with:
          name: changed-projects
          path: build/monorepo/changed-projects.txt

      - name: Build changed projects
        run: ./gradlew buildChangedProjectsFromRef
