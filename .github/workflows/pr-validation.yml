name: PR Validation

on:
  pull_request:
    branches:
      - main
      - 'release/*/v*.x'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build changed projects
        run: ./gradlew buildChangedProjects
